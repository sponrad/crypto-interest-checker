<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <title>Crypto Checker</title>
    <style id="app-reset">
      html,
      body {
        height: 100%;
        margin: 0;
        background-color: #000000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body {
        overflow: hidden;
        min-height: 100%;
        min-height: -webkit-fill-available;
      }

      #root {
        display: flex;
        height: 100%;
        min-height: 100%;
        min-height: -webkit-fill-available;
        flex: 1;
        background-color: #000000;
      }

      html.privacy-locked #root {
        visibility: hidden !important;
      }

      html.privacy-unlock-grace #root {
        pointer-events: none !important;
      }

      .privacy-splash {
        background-color: #000;
        width: 100%;
        height: 100%;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }

      .privacy-splash-icon {
        width: 100px;
        height: 100px;
        border-radius: 22px;
      }

      .privacy-splash-title {
        margin: 30px 0 0;
        color: #fff;
        font-size: 18px;
      }

      .privacy-splash-hint {
        margin: 20px 0 0;
        color: #888;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div
      id="web-privacy-overlay"
      style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;z-index:999999;background:#000;align-items:center;justify-content:center;flex-direction:column;color:#fff;font-family:system-ui,sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;"
    >
      <div class="privacy-splash">
        <img class="privacy-splash-icon" src="/icon.png" alt="" />
        <p class="privacy-splash-title">👁 Privacy 👁</p>
        <p class="privacy-splash-hint">Tap to view portfolio</p>
      </div>
    </div>
    <script>
      (function () {
        var OVERLAY_ID = 'web-privacy-overlay';
        var ROOT_ID = 'root';
        var LOCK_CLASS = 'privacy-locked';
        var isTouch =
          'ontouchstart' in window ||
          (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);

        var unlockGraceUntil = 0;
        var UNLOCK_GRACE_MS = 600;
        var unlockGraceTimer = null;

        function beginUnlockGrace() {
          unlockGraceUntil = Date.now() + UNLOCK_GRACE_MS;
          window.__webPrivacyUnlockGraceUntil = unlockGraceUntil;
          document.documentElement.classList.add('privacy-unlock-grace');
          if (unlockGraceTimer) {
            clearTimeout(unlockGraceTimer);
          }
          unlockGraceTimer = setTimeout(function () {
            document.documentElement.classList.remove('privacy-unlock-grace');
            unlockGraceTimer = null;
          }, UNLOCK_GRACE_MS);
        }

        function lockNow() {
          if (Date.now() < unlockGraceUntil) {
            return;
          }
          if (unlockGraceTimer) {
            clearTimeout(unlockGraceTimer);
            unlockGraceTimer = null;
          }
          document.documentElement.classList.remove('privacy-unlock-grace');
          window.__webPrivacyIsLocked = true;
          document.documentElement.classList.add(LOCK_CLASS);
          var overlay = document.getElementById(OVERLAY_ID);
          var root = document.getElementById(ROOT_ID);
          if (overlay) {
            overlay.style.display = 'flex';
            overlay.style.pointerEvents = 'auto';
          }
          if (root) {
            root.setAttribute('aria-hidden', 'true');
          }
          window.dispatchEvent(new Event('webprivacy-lock'));
        }

        function unlockNow(event) {
          if (event) {
            event.preventDefault();
            event.stopPropagation();
          }
          beginUnlockGrace();
          window.__webPrivacyIsLocked = false;
          document.documentElement.classList.remove(LOCK_CLASS);
          var overlay = document.getElementById(OVERLAY_ID);
          var root = document.getElementById(ROOT_ID);
          if (overlay) {
            overlay.style.display = 'none';
            overlay.style.pointerEvents = 'none';
          }
          if (root) {
            root.removeAttribute('aria-hidden');
          }
          window.dispatchEvent(new Event('webprivacy-unlock'));
        }

        function handleOverlayUnlock(event) {
          if (!window.__webPrivacyIsLocked) {
            return;
          }
          unlockNow(event);
        }

        window.__webPrivacyLock = lockNow;
        window.__webPrivacyUnlock = unlockNow;
        window.__webPrivacyIsLocked = false;
        window.__webPrivacyUnlockGraceUntil = 0;
        window.__webPrivacyIsTouch = isTouch;

        var overlay = document.getElementById(OVERLAY_ID);
        if (overlay) {
          overlay.addEventListener('touchend', handleOverlayUnlock, { passive: false });
          overlay.addEventListener('click', function (event) {
            if (isTouch) {
              return;
            }
            handleOverlayUnlock(event);
          });
        }

        document.addEventListener(
          'visibilitychange',
          function () {
            if (document.hidden || document.visibilityState === 'hidden') {
              lockNow();
            }
          },
          true
        );
        window.addEventListener('pagehide', lockNow, true);
        document.addEventListener('freeze', lockNow, true);

        lockNow();
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
